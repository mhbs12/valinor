<div class="column-wrapper">
  
  <!-- Cabeçalho da Coluna -->
  <div class="column-header">
    @if (isEditing()) {
      <!-- Modo de Edição -->
      <div class="edit-header">
        <input 
          [ngModel]="editName()"
          (ngModelChange)="editName.set($event)"
          (keyup.enter)="saveEditing()"
          (keyup.escape)="cancelEditing()"
        autoFocus
        class="edit-input"
        maxlength="50"
      />
        <button (click)="saveEditing()" class="save-btn">✓</button>
        <button (click)="cancelEditing()" class="cancel-btn">×</button>
      </div>
    } @else {
      <h3 (dblclick)="startEditing()" title="Clique duplo para editar">
        {{ columnTitle() }}
      </h3>
      <div class="column-actions">
        <button class="action-btn" (click)="startEditing()" title="Editar nome">✎</button>
        <button class="action-btn delete-btn-header" (click)="deleteColumn()" title="Excluir coluna">×</button>
      </div>
    }
  </div>

  <!-- Área de Adicionar Tarefa -->
  <div class="add-task-container">
    @if (isAddingTask()) {
      <div class="add-task-form">
        <textarea
          placeholder="Digite o título da tarefa..."
          [ngModel]="newTaskText()"
          (ngModelChange)="newTaskText.set($event)"
          (keyup.enter)="saveNewTask()"
          (keyup.escape)="cancelTaskAddition()"
          autoFocus
          rows="3"
        ></textarea>
        <div class="add-task-actions">
          <button class="btn-add-task" (click)="saveNewTask()">Adicionar</button>
          <button class="btn-cancel-task" (click)="cancelTaskAddition()">×</button>
        </div>
      </div>
    } @else {
      <button class="btn-add-card" (click)="isAddingTask.set(true)">
        + Adicionar um cartão
      </button>
    }
  </div>

  <!-- Lista de Tarefas: Área onde os cards são soltos (DropList) -->
  <div
    cdkDropList
    class="lista-cards"
    [id]="id()"
    [cdkDropListData]="taskList()"
    (cdkDropListDropped)="handleDrop($event)"
  >
    @for (task of taskList(); track task.id) {
      <app-card 
        [text]="task.text" 
        cdkDrag 
        [cdkDragData]="task"
        (onDelete)="deleteTask(task.id)">
      </app-card>
    }
  </div>
</div>
