<div class="board-wrapper" cdkDropListGroup>
  @for (lane of distributedColumns(); track $index; let i = $index) {
    <div class="board-lane">
      @for (column of lane; track column.id) {
        <app-column 
          [id]="column.id"
          [columnTitle]="column.name" 
          [taskList]="column.tasks" 
          (onDrop)="onTaskMoved($event, column.id)"
          (onDeleteTask)="deleteTask($event)"
          (onDeleteColumn)="deleteColumn(column.id)"
          (onUpdateColumn)="updateColumnName(column.id, $event)"
          (onAddTask)="addTask(column.id, $event)">
        </app-column>
      }

      @if (i === addColumnButtonLane()) {
        <div class="add-column-container" [class.adding]="isAddingColumn()">
          @if (isAddingColumn()) {
            <div class="add-column-form">
              <input
                type="text"
                placeholder="Enter column title..."
                [ngModel]="newColumnName()"
                (ngModelChange)="newColumnName.set($event)"
                (keyup.enter)="addColumn()"
                (keyup.escape)="cancelColumnAddition()"
                autoFocus
              />
              <div class="add-column-actions">
                <button class="btn-add" (click)="addColumn()">Add column</button>
                <button class="btn-close" (click)="cancelColumnAddition()">×</button>
              </div>
            </div>
          } @else {
            <button class="btn-placeholder" (click)="isAddingColumn.set(true)">
              <span class="plus-icon">+</span>
            </button>
          }
        </div>
      }
    </div>
  }
</div>
